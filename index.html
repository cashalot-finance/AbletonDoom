<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math DAW - Pro Edition</title>
    <style>
        /* DOOM Theme (Default) */
        :root, :root[data-theme="doom"] {
            --bg-color: #1a0f0f;
            --panel-bg: #2b1111;
            --track-bg: #381515;
            --accent: #ff3300;
            --accent-hover: #ff6600;
            --text: #ffcccc;
            --grid-off: #4a1c1c;
            --grid-on: #ff3300;
            --grid-active: #fff;
            --font: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Synthwave Theme */
        :root[data-theme="synthwave"] {
            --bg-color: #0d0221;
            --panel-bg: #261447;
            --track-bg: #321b5c;
            --accent: #ff007f;
            --accent-hover: #00f0ff;
            --text: #f5d0fe;
            --grid-off: #462580;
            --grid-on: #ff007f;
            --grid-active: #00f0ff;
        }

        /* Standard Dark Theme */
        :root[data-theme="dark"] {
            --bg-color: #121212;
            --panel-bg: #222;
            --track-bg: #2a2a2a;
            --accent: #00d2ff;
            --accent-hover: #3a86ff;
            --text: #eee;
            --grid-off: #333;
            --grid-on: #00d2ff;
            --grid-active: #fff;
        }

        body {
            font-family: var(--font); background-color: var(--bg-color); color: var(--text);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            user-select: none;
        }

        .header { display: flex; justify-content: space-between; width: 100%; max-width: 900px; margin-bottom: 20px; }
        h1 { margin: 0; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); }

        .master-controls {
            display: flex; gap: 15px; background: var(--panel-bg); padding: 15px 25px;
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); align-items: center;
            flex-wrap: wrap;
        }

        .theme-selector {
            display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px; color: #aaa; margin-left: auto;
        }
        .theme-selector select {
            background: var(--bg-color); color: var(--text); border: 1px solid var(--accent);
            padding: 5px; border-radius: 4px; outline: none; cursor: pointer;
        }

        button.play-btn {
            background: var(--accent); color: #000; border: none; padding: 10px 30px;
            font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        button.play-btn:hover { background: var(--accent-hover); color: white; }

        .knob-group { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px; color: #aaa; }
        input[type=range] { width: 80px; accent-color: var(--accent); cursor: pointer; }

        .daw-container {
            display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 900px;
        }

        .track {
            display: flex; align-items: center; background: var(--track-bg);
            padding: 10px; border-radius: 6px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .track-header { width: 340px; display: flex; flex-direction: column; gap: 8px; padding-right: 15px; border-right: 2px solid #444; flex-shrink: 0;}
        .track-title { font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .track-params { display: flex; gap: 10px; flex-wrap: wrap;}

        .sequencer-grid { display: flex; gap: 6px; padding-left: 15px; flex-wrap: nowrap; overflow-x: auto; }

        .step {
            width: 35px; height: 45px; background-color: var(--grid-off);
            border-radius: 4px; cursor: pointer; transition: 0.1s; border: 1px solid #222;
        }
        .step.active { background-color: var(--grid-on); box-shadow: 0 0 12px rgba(0, 210, 255, 0.4); }
        .step.playing { border: 2px solid white; transform: scale(1.05); background-color: var(--grid-active); }

        .fx-section { display: flex; gap: 15px; border-left: 1px solid #555; padding-left: 15px; margin-left: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Math DAW</h1>
        <div class="master-controls">
            <button class="play-btn" id="playBtn">▶ PLAY / STOP</button>
            <div class="knob-group">
                <label>BPM: <span id="bpmVal">120</span></label>
                <input type="range" id="bpm" min="60" max="200" value="120">
            </div>
            <div class="fx-section">
                <div class="knob-group">
                    <label>Distort</label>
                    <input type="range" id="distMix" min="0" max="100" value="10">
                </div>
                <div class="knob-group">
                    <label>Delay</label>
                    <input type="range" id="delayMix" min="0" max="100" value="20">
                </div>
                <div class="knob-group">
                    <label>Reverb</label>
                    <input type="range" id="reverbMix" min="0" max="100" value="15">
                </div>
                <div class="knob-group">
                    <label>Master Vol</label>
                    <input type="range" id="masterVol" min="0" max="150" value="80">
                </div>
            </div>
            <div class="theme-selector">
                <label>Theme</label>
                <select id="themeSelect">
                    <option value="doom">Doom</option>
                    <option value="synthwave">Synthwave</option>
                    <option value="dark">Pro Dark</option>
                </select>
            </div>
        </div>
    </div>

    <div class="daw-container" id="daw"></div>

<script>
    let audioCtx;
    let masterGain, delayNode, feedbackGain, reverbNode, delayMix, reverbMix, distortionNode;
    
    // Параметры синтеза для каждого инструмента
    const synths = [
        {
            name: 'KICK',
            params: [
                { name: 'Pitch', value: 150, min: 50, max: 300, step: 1 },
                { name: 'Decay', value: 0.5, min: 0.1, max: 2.0, step: 0.01 },
                { name: 'Sweep', value: 50, min: 10, max: 100, step: 1 },
                { name: 'Click', value: 0.2, min: 0, max: 1, step: 0.01 }
            ]
        },
        {
            name: 'SNARE',
            params: [
                { name: 'Tone', value: 250, min: 100, max: 500, step: 1 },
                { name: 'Decay', value: 0.2, min: 0.05, max: 0.6, step: 0.01 },
                { name: 'Noise', value: 0.8, min: 0, max: 2, step: 0.01 },
                { name: 'HPF', value: 1500, min: 500, max: 4000, step: 10 }
            ]
        },
        {
            name: 'HI-HAT',
            params: [
                { name: 'Cutoff', value: 8000, min: 2000, max: 15000, step: 100 },
                { name: 'Decay', value: 0.05, min: 0.02, max: 0.3, step: 0.01 },
                { name: 'Res', value: 5, min: 0, max: 20, step: 0.1 },
                { name: 'Vol', value: 0.8, min: 0, max: 1.5, step: 0.01 }
            ]
        },
        {
            name: 'FM BASS',
            params: [
                { name: 'CarFreq', value: 55, min: 20, max: 200, step: 1 },
                { name: 'ModFreq', value: 110, min: 20, max: 400, step: 1 },
                { name: 'ModIdx', value: 500, min: 0, max: 2000, step: 10 },
                { name: 'Decay', value: 0.4, min: 0.1, max: 1.5, step: 0.01 }
            ]
        },
        {
            name: 'FM LEAD',
            params: [
                { name: 'CarFreq', value: 440, min: 100, max: 2000, step: 1 },
                { name: 'ModFreq', value: 884, min: 100, max: 4000, step: 1 },
                { name: 'ModIdx', value: 600, min: 0, max: 3000, step: 10 },
                { name: 'Decay', value: 0.3, min: 0.1, max: 2.0, step: 0.01 }
            ]
        }
    ];

    const stepsCount = 16;
    let grid = Array(synths.length).fill().map(() => Array(stepsCount).fill(false));
    const uiSteps = [];

    // --- АУДИО ДВИЖОК ---

    function makeDistortionCurve(amount) {
        let k = typeof amount === 'number' ? amount : 50,
            n_samples = 44100,
            curve = new Float32Array(n_samples),
            deg = Math.PI / 180,
            i = 0,
            x;
        for ( ; i < n_samples; ++i ) {
            x = i * 2 / n_samples - 1;
            curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
        }
        return curve;
    }

    function initAudio() {
        if(audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.8;

        // Master Distortion
        distortionNode = audioCtx.createWaveShaper();
        distortionNode.curve = makeDistortionCurve(10); // initial 10 amount
        distortionNode.oversample = '4x';

        distortionNode.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        // Математический Reverb (Генерация Impulse Response)
        let len = audioCtx.sampleRate * 2.5; // 2.5 секунды
        let impulse = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
        for (let i = 0; i < 2; i++) {
            let channel = impulse.getChannelData(i);
            for (let j = 0; j < len; j++) {
                channel[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / len, 4); // Экспоненциальное затухание шума
            }
        }
        reverbNode = audioCtx.createConvolver();
        reverbNode.buffer = impulse;
        
        reverbMix = audioCtx.createGain();
        reverbMix.gain.value = 0.15;
        reverbNode.connect(reverbMix).connect(masterGain);

        // Delay Bus
        delayNode = audioCtx.createDelay();
        delayNode.delayTime.value = 0.375; // 3/16 при 120 bpm (будет обновляться)
        feedbackGain = audioCtx.createGain();
        feedbackGain.gain.value = 0.4;
        
        delayMix = audioCtx.createGain();
        delayMix.gain.value = 0.2;

        delayNode.connect(feedbackGain);
        feedbackGain.connect(delayNode);
        delayNode.connect(delayMix).connect(masterGain);
        
        // Отправляем дилей в реверб для объема
        delayNode.connect(reverbNode);
    }

    // Маршрутизатор (отправляет звук в мастер и на шины эффектов)
    function routeAudio(source) {
        source.connect(distortionNode); // В дисторшн перед мастером
        source.connect(delayNode);
        source.connect(reverbNode);
    }

    // --- АЛГОРИТМЫ СИНТЕЗА ---

    function playKick(time, p) {
        const pitch = p[0].value; const decay = p[1].value; const sweep = p[2].value; const click = p[3].value;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(pitch, time);
        osc.frequency.exponentialRampToValueAtTime(0.001, time + decay / (sweep/10));

        // click
        if (click > 0) {
            const clickOsc = audioCtx.createOscillator();
            clickOsc.type = 'square';
            clickOsc.frequency.setValueAtTime(3000, time);
            clickOsc.frequency.exponentialRampToValueAtTime(0.01, time + 0.02);
            const clickGain = audioCtx.createGain();
            clickGain.gain.setValueAtTime(click, time);
            clickGain.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
            clickOsc.connect(clickGain); routeAudio(clickGain);
            clickOsc.start(time); clickOsc.stop(time + 0.02);
        }

        gain.gain.setValueAtTime(1, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + decay);
        osc.connect(gain); routeAudio(gain);
        osc.start(time); osc.stop(time + decay);
    }

    function playSnare(time, p) {
        const tone = p[0].value; const decay = p[1].value; const noiseVol = p[2].value; const hpf = p[3].value;
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(tone, time);
        osc.frequency.exponentialRampToValueAtTime(tone / 2, time + decay / 2);
        oscGain.gain.setValueAtTime(0.8, time);
        oscGain.gain.exponentialRampToValueAtTime(0.01, time + decay);
        osc.connect(oscGain); routeAudio(oscGain);
        osc.start(time); osc.stop(time + decay);

        const bufferSize = audioCtx.sampleRate * decay;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'highpass'; noiseFilter.frequency.value = hpf;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(noiseVol, time);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, time + decay);
        noise.connect(noiseFilter).connect(noiseGain); routeAudio(noiseGain);
        noise.start(time);
    }

    function playHiHat(time, p) {
        const cutoff = p[0].value; const decay = p[1].value; const res = p[2].value; const vol = p[3].value;
        const bufferSize = audioCtx.sampleRate * decay;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = cutoff; filter.Q.value = res;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(vol, time); gain.gain.exponentialRampToValueAtTime(0.01, time + decay);
        noise.connect(filter).connect(gain); routeAudio(gain);
        noise.start(time);
    }

    function playBass(time, p) {
        const cFreq = p[0].value; const mFreq = p[1].value; const mIdx = p[2].value; const decay = p[3].value;
        const carrier = audioCtx.createOscillator(); carrier.type = 'sine'; carrier.frequency.value = cFreq;
        const modulator = audioCtx.createOscillator(); modulator.type = 'sine'; modulator.frequency.value = mFreq;

        const modGain = audioCtx.createGain(); modGain.gain.value = mIdx;
        // envelop for mod index
        modGain.gain.setValueAtTime(mIdx * 2, time); modGain.gain.exponentialRampToValueAtTime(mIdx, time + decay);

        modulator.connect(modGain); modGain.connect(carrier.frequency);

        const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.8, time); gain.gain.exponentialRampToValueAtTime(0.01, time + decay);
        carrier.connect(gain); routeAudio(gain);

        modulator.start(time); carrier.start(time);
        modulator.stop(time + decay); carrier.stop(time + decay);
    }

    function playLead(time, p) {
        const cFreq = p[0].value; const mFreq = p[1].value; const mIdx = p[2].value; const decay = p[3].value;
        const carrier = audioCtx.createOscillator(); carrier.type = 'sine'; carrier.frequency.value = cFreq;
        const modulator = audioCtx.createOscillator(); modulator.type = 'sine'; modulator.frequency.value = mFreq;
        
        const modGain = audioCtx.createGain(); modGain.gain.value = mIdx;
        modulator.connect(modGain); modGain.connect(carrier.frequency);
        
        const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.5, time); gain.gain.setTargetAtTime(0, time + decay / 2, decay / 2);
        carrier.connect(gain); routeAudio(gain);
        
        modulator.start(time); carrier.start(time);
        modulator.stop(time + decay); carrier.stop(time + decay);
    }

    const soundEngines = [playKick, playSnare, playHiHat, playBass, playLead];

    // --- ИНТЕРФЕЙС И ЛОГИКА ---

    const daw = document.getElementById('daw');
    synths.forEach((synth, trackIdx) => {
        const trackDiv = document.createElement('div'); trackDiv.className = 'track';
        
        // Панель управления синтезатором
        const header = document.createElement('div'); header.className = 'track-header';
        header.innerHTML = `<div class="track-title">${synth.name}</div>`;
        
        const params = document.createElement('div'); params.className = 'track-params';
        
        synth.params.forEach((param, pIdx) => {
            const pDiv = document.createElement('div'); pDiv.className = 'knob-group';
            pDiv.innerHTML = `<label>${param.name}</label><input type="range" min="${param.min}" max="${param.max}" step="${param.step}" value="${param.value}">`;
            pDiv.querySelector('input').addEventListener('input', (e) => synths[trackIdx].params[pIdx].value = parseFloat(e.target.value));
            params.appendChild(pDiv);
        });

        header.appendChild(params); trackDiv.appendChild(header);

        // Сетка
        const gridDiv = document.createElement('div'); gridDiv.className = 'sequencer-grid';
        uiSteps[trackIdx] = [];
        for (let i = 0; i < stepsCount; i++) {
            const step = document.createElement('div'); step.className = 'step';
            step.addEventListener('click', () => {
                grid[trackIdx][i] = !grid[trackIdx][i]; step.classList.toggle('active');
            });
            gridDiv.appendChild(step); uiSteps[trackIdx].push(step);
        }
        trackDiv.appendChild(gridDiv); daw.appendChild(trackDiv);
    });

    // Дефолтный паттерн (Doom-like Industrial Groove)
    [0, 4, 8, 10].forEach(i => { grid[0][i] = true; uiSteps[0][i].classList.add('active'); }); // Kick
    [4, 12].forEach(i => { grid[1][i] = true; uiSteps[1][i].classList.add('active'); }); // Snare
    [2, 6, 10, 14].forEach(i => { grid[2][i] = true; uiSteps[2][i].classList.add('active'); }); // Hat
    [0, 3, 6, 9, 12, 14].forEach(i => { grid[3][i] = true; uiSteps[3][i].classList.add('active'); }); // Bass
    [0, 7, 12].forEach(i => { grid[4][i] = true; uiSteps[4][i].classList.add('active'); }); // Lead

    // Глобальные контроллы
    let isPlaying = false, currentStep = 0, nextNoteTime = 0.0, bpm = 120, timerID;

    document.getElementById('themeSelect').addEventListener('change', (e) => {
        document.documentElement.setAttribute('data-theme', e.target.value);
    });

    document.getElementById('bpm').addEventListener('input', (e) => {
        bpm = e.target.value; document.getElementById('bpmVal').innerText = bpm;
        if (audioCtx && delayNode) delayNode.delayTime.value = (60 / bpm) * 0.75; // Синхронизация дилея (Dotted 8th)
    });

    document.getElementById('distMix').addEventListener('input', (e) => { if(audioCtx) distortionNode.curve = makeDistortionCurve(parseInt(e.target.value)); });
    document.getElementById('delayMix').addEventListener('input', (e) => { if(audioCtx) delayMix.gain.value = e.target.value / 100; });
    document.getElementById('reverbMix').addEventListener('input', (e) => { if(audioCtx) reverbMix.gain.value = e.target.value / 100; });
    document.getElementById('masterVol').addEventListener('input', (e) => { if(audioCtx) masterGain.gain.value = e.target.value / 100; });

    function scheduleNote(stepNumber, time) {
        for (let t = 0; t < synths.length; t++) {
            if (grid[t][stepNumber]) soundEngines[t](time, synths[t].params);
        }
        requestAnimationFrame(() => {
            for (let t = 0; t < synths.length; t++) {
                uiSteps[t].forEach(s => s.classList.remove('playing'));
                uiSteps[t][stepNumber].classList.add('playing');
            }
        });
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            scheduleNote(currentStep, nextNoteTime);
            nextNoteTime += 0.25 * (60.0 / bpm);
            currentStep = (currentStep + 1) % stepsCount;
        }
        timerID = setTimeout(scheduler, 25.0);
    }

    document.getElementById('playBtn').addEventListener('click', () => {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isPlaying = !isPlaying;
        if (isPlaying) {
            currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.05; scheduler();
            document.getElementById('playBtn').innerText = '⏸ STOP';
        } else {
            clearTimeout(timerID);
            for (let t = 0; t < synths.length; t++) uiSteps[t].forEach(s => s.classList.remove('playing'));
            document.getElementById('playBtn').innerText = '▶ PLAY';
        }
    });
</script>
</body>
</html>
